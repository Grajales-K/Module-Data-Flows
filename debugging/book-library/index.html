<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Library</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header role="banner" class="jumbotron text-center">
      <h1>Library</h1>
      <p>Add books to your virtual library</p>
    </header>

    <main>
      <button data-toggle="collapse" data-target="#demo" class="btn btn-info btn-add">
        Add new book
      </button>

      <form id="demo" class="collapse">
        <div class="form-group">
          <label for="title">Title:</label>
          <input
            type="text"
            class="form-control"
            id="title"
            name="title"
            required
          />

          <label for="author">Author: </label>
          <input
            type="text"
            class="form-control"
            id="author"
            name="author"
            required
          />

          <label for="pages">Pages: </label>
          <input
            type="number"
            class="form-control"
            id="pages"
            name="pages"
            min="1"
            required
          />
          
          <input type="checkbox" class="check-box" id="check" />
          <label class="check-label" for="check">Read</label>
        
          <button type="submit" class="btn btn-primary">Submit Book</button>
        </div>
      </form>

      <table class="table table-sm table-hover" id="display">
        <thead class="thead-dark">
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>No. Pages</th>
            <th>Read</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </main>
    <script src="script.js" type="module"></script>
  </body>
</html>
