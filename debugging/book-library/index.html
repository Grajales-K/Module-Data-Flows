<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Library</title>

   
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>

  <body>
    <div role="banner" class="jumbotron text-center">
      <h1>Library</h1>
      <p>Add books to your virtual library</p>
    </div>

    <div class="container mb-3">
        <button data-toggle="collapse" data-target="#demo" class="btn btn-info">
          Add new book
        </button>
    </div>

    <form id="demo" class="collapse container">
      <div class="form-group p-3 border rounded bg-light">

        <label for="title:" class="mt-2">Title:</label>
        <input type="text" class="form-control" id="title" name="title" required />

        <label for="author" class="mt-2">Author: </label>
        <input type="text" class="form-control" id="author" name="author" required />

        <label for="pages" class="mt-2">Pages: </label>
        <input type="number" class="form-control" id="pages" name="pages" required />

        <label class="form-check mt-3 mb-3">
        <input type="checkbox" class="form-check-input" id="check"> Read </label>

       <button type="submit" class="btn btn-primary">Submit Book</button> 
      </div>
    </form>


      <table class="table" id="display">
        <thead class="thead-dark">
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>No. Pages</th>
            <th>Read</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="table-body">
        </tbody>
      </table>
    <script src="script.js" type="module"></script>
  </body>
</html>
